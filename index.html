<style>
:root {
  --gold: #C9A84C;
  --gold-light: #E8C97A;
  --gold-dark: #9A7A2E;
  --dark: #0D0D0D;
  --dark2: #141414;
  --dark3: #1C1C1C;
  --dark4: #242424;
  --mid: #333;
  --light: #F5F0E8;
  --light2: #EDE5D5;
  --white: #FFFFFF;
  --text-muted: #888;
  --text-mid: #BBB;
  --green: #2ECC71;
  --red: #E74C3C;
  --blue: #3498DB;
  --orange: #E67E22;
  --radius: 14px;
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
  --shadow-gold: 0 4px 24px rgba(201,168,76,0.25);
  --transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
}

*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--white);overflow-x:hidden;}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:var(--dark2);}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px;}

/* ===== NAV ===== */
nav{position:fixed;top:0;left:0;right:0;z-index:1000;padding:18px 40px;display:flex;align-items:center;justify-content:space-between;transition:var(--transition);}
nav.scrolled{background:rgba(13,13,13,0.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(201,168,76,0.15);}
.nav-logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--gold);letter-spacing:1px;text-decoration:none;}
.nav-links{display:flex;gap:32px;list-style:none;}
.nav-links a{color:var(--text-mid);text-decoration:none;font-size:14px;font-weight:500;letter-spacing:0.5px;transition:var(--transition);}
.nav-links a:hover{color:var(--gold);}
.nav-cta{display:flex;gap:12px;align-items:center;}
.btn-nav{padding:10px 24px;border-radius:50px;font-size:13px;font-weight:600;cursor:pointer;transition:var(--transition);text-decoration:none;border:none;}
.btn-nav-outline{background:transparent;border:1px solid rgba(201,168,76,0.4);color:var(--gold);}
.btn-nav-outline:hover{border-color:var(--gold);background:rgba(201,168,76,0.1);}
.btn-nav-fill{background:var(--gold);color:var(--dark);}
.btn-nav-fill:hover{background:var(--gold-light);transform:translateY(-1px);}

/* ===== HERO ===== */
#hero{min-height:100vh;position:relative;display:flex;align-items:center;overflow:hidden;}
.hero-bg{position:absolute;inset:0;background-image:url('https://images.unsplash.com/photo-1503951914875-452162b0f3f1?w=1600&q=80');background-size:cover;background-position:center;filter:brightness(0.35);}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(135deg,rgba(13,13,13,0.85) 0%,rgba(13,13,13,0.3) 100%);}
.hero-content{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:0 40px;padding-top:100px;}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(201,168,76,0.15);border:1px solid rgba(201,168,76,0.3);border-radius:50px;padding:8px 20px;font-size:12px;font-weight:600;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:28px;animation:fadeInUp 0.8s ease both;}
.hero-title{font-family:'Playfair Display',serif;font-size:clamp(48px,7vw,88px);font-weight:900;line-height:1.05;margin-bottom:24px;animation:fadeInUp 0.8s 0.1s ease both;}
.hero-title span{color:var(--gold);}
.hero-sub{font-size:18px;color:var(--text-mid);max-width:540px;line-height:1.7;margin-bottom:40px;animation:fadeInUp 0.8s 0.2s ease both;}
.hero-btns{display:flex;gap:16px;flex-wrap:wrap;animation:fadeInUp 0.8s 0.3s ease both;}
.btn-primary{padding:16px 36px;background:var(--gold);color:var(--dark);border-radius:50px;font-weight:700;font-size:15px;cursor:pointer;border:none;transition:var(--transition);text-decoration:none;}
.btn-primary:hover{background:var(--gold-light);transform:translateY(-2px);box-shadow:var(--shadow-gold);}
.btn-wa{padding:16px 36px;background:rgba(37,211,102,0.15);border:1px solid rgba(37,211,102,0.4);color:#25D366;border-radius:50px;font-weight:700;font-size:15px;cursor:pointer;transition:var(--transition);text-decoration:none;display:flex;align-items:center;gap:10px;}
.btn-wa:hover{background:rgba(37,211,102,0.25);transform:translateY(-2px);}
.hero-stats{display:flex;gap:48px;margin-top:64px;animation:fadeInUp 0.8s 0.4s ease both;flex-wrap:wrap;}
.stat{border-left:2px solid var(--gold);padding-left:20px;}
.stat-num{font-family:'Playfair Display',serif;font-size:36px;font-weight:900;color:var(--gold);}
.stat-label{font-size:13px;color:var(--text-muted);margin-top:2px;}

          <option value="Corte Mujer">Corte Mujer</option>
          <option value="Barba">Perfilado Barba</option>
        </select>
      </div>
    </div>
    <div class="modal-row">
      <div class="modal-group">
        <label>Fecha</label>
        <input type="date" id="m-date">
      </div>
      <div class="modal-group">
        <label>Hora</label>
        <input type="time" id="m-time">
      </div>
    </div>
    <div class="modal-btns">
      <button class="login-btn" onclick="saveNewCita()">Guardar Cita</button>
    </div>
  </div>
</div>

<div id="modal-status" class="modal-overlay">
  <div class="modal">
    <div class="modal-title">
      Actualizar Estado
      <span class="modal-close" onclick="closeStatusModal()">×</span>
    </div>
    <div style="margin-bottom:20px;">
      <p id="status-cita-info" style="font-size:14px;color:var(--text-muted);"></p>
    </div>
    <div class="estado-btns">
      <button class="estado-btn e-pending" onclick="updateCitaStatus('pendiente')">Pendiente</button>
      <button class="estado-btn e-confirmed" onclick="updateCitaStatus('confirmada')">Confirmada</button>
      <button class="estado-btn e-arrived" onclick="updateCitaStatus('en local')">En Local</button>
      <button class="estado-btn e-noshow" onclick="updateCitaStatus('no presentado')">No Vino</button>
      <button class="estado-btn e-cancelled" onclick="updateCitaStatus('cancelada')">Cancelada</button>
    </div>
    <div style="margin-top:32px; border-top:1px solid rgba(255,255,255,0.05); padding-top:24px;">
      <p style="font-size:12px; font-weight:700; color:var(--text-muted); text-transform:uppercase; margin-bottom:16px;">Acciones WhatsApp</p>
      <div class="wa-templates">
        <div class="wa-template">
          <div class="wa-template-title">Recordatorio</div>
          <div class="wa-template-text">Hola, te recordamos tu cita hoy a las...</div>
          <button class="wa-send-btn" onclick="sendWA('recordatorio')">Enviar</button>
        </div>
        <div class="wa-template">
          <div class="wa-template-title">Confirmación</div>
          <div class="wa-template-text">Hola, confirmamos tu cita para el día...</div>
          <button class="wa-send-btn" onclick="sendWA('confirmacion')">Enviar</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
/* ===== DATABASE SIMULADA ===== */
let citas = [
  {id:1, name: "Roberto Gomez", tel: "611223344", service: "Corte Hombre", date: "2024-05-20", time: "10:00", status: "confirmada"},
  {id:2, name: "Lucía Fernández", tel: "622334455", service: "Corte Mujer", date: "2024-05-20", time: "11:30", status: "pendiente"},
  {id:3, name: "Marco Polo", tel: "633445566", service: "Barba", date: "2024-05-20", time: "12:00", status: "confirmada"},
  {id:4, name: "Sonia Valls", tel: "644556677", service: "Color", date: "2024-05-20", time: "16:00", status: "pendiente"},
  {id:5, name: "Iker Jiménez", tel: "655667788", service: "Corte Hombre", date: "2024-05-21", time: "10:30", status: "confirmada"}
];

let selectedCitaId = null;

/* ===== NAVBAR SCROLL ===== */
window.addEventListener('scroll', () => {
  const nav = document.getElementById('navbar');
  if(window.scrollY > 50) nav.classList.add('scrolled');
  else nav.classList.remove('scrolled');
  
  // Animación fade-in
  document.querySelectorAll('.fade-in').forEach(el => {
    const rect = el.getBoundingClientRect();
    if(rect.top < window.innerHeight * 0.9) el.classList.add('visible');
  });
});

/* ===== LOGIN LOGIC ===== */
function openLogin() {
  document.getElementById('login-overlay').classList.add('active');
}
function closeLogin() {
  document.getElementById('login-overlay').classList.remove('active');
}

/** * AQUÍ ESTÁ EL CAMBIO QUE PEDISTE: admin / 123
 */
function doLogin() {
  const user = document.getElementById('login-user').value;
  const pass = document.getElementById('login-pass').value;
  const errorMsg = document.getElementById('login-error');

  if(user === "admin" && pass === "123") {
    errorMsg.style.display = 'none';
    document.getElementById('login-overlay').classList.remove('active');
    document.getElementById('panel-overlay').classList.add('active');
    document.body.style.overflow = 'hidden'; // Evita scroll web
    renderDash();
  } else {
    errorMsg.style.display = 'block';
    document.getElementById('login-pass').value = "";
  }
}

function logout() {
  document.getElementById('panel-overlay').classList.remove('active');
  document.body.style.overflow = 'auto';
  closeLogin();
}

/* ===== PANEL NAVIGATION ===== */
function switchView(view) {
  document.querySelectorAll('.panel-view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  
  document.getElementById('view-' + view).classList.add('active');
  document.querySelector(`[onclick="switchView('${view}')"]`).classList.add('active');
  
  const titles = {dash: 'Dashboard', agenda: 'Agenda Diaria', citas: 'Gestión de Reservas', clientes: 'Base de Datos Clientes'};
  document.getElementById('view-title').innerText = titles[view];

  if(view === 'dash') renderDash();
  if(view === 'citas') renderAllCitas();
  if(view === 'agenda') renderAgenda();
  if(view === 'clientes') renderClientes();
}

/* ===== RENDERING FUNCTIONS ===== */
function getStatusBadge(status) {
  const classes = {
    pendiente: 'badge-pending',
    confirmada: 'badge-confirmed',
    'en local': 'badge-arrived',
    'no presentado': 'badge-no-show',
    cancelada: 'badge-cancelled'
  };
  return `<span class="badge ${classes[status] || ''}">${status.toUpperCase()}</span>`;
}

function renderDash() {
  const tbody = document.getElementById('dash-citas-tbody');
  tbody.innerHTML = "";
  // Mostrar las primeras 4
  citas.slice(0,4).forEach(cita => {
    tbody.innerHTML += `
      <tr>
        <td><strong>${cita.name}</strong></td>
        <td>${cita.time}</td>
        <td>${cita.service}</td>
        <td>${getStatusBadge(cita.status)}</td>
        <td><button class="btn-small btn-small-outline" onclick="openStatusModal(${cita.id})">Gestionar</button></td>
      </tr>
    `;
  });
}

function renderAllCitas() {
  const tbody = document.getElementById('all-citas-tbody');
  tbody.innerHTML = "";
  citas.forEach(cita => {
    tbody.innerHTML += `
      <tr>
        <td><strong>${cita.name}</strong><br><small>${cita.tel}</small></td>
        <td>${cita.date}<br>${cita.time}</td>
        <td>${cita.service}</td>
        <td>${getStatusBadge(cita.status)}</td>
        <td>
          <button class="btn-small btn-small-outline" onclick="openStatusModal(${cita.id})">Estado</button>
          <button class="btn-small btn-small-outline" style="color:var(--red)" onclick="deleteCita(${cita.id})">×</button>
        </td>
      </tr>
    `;
  });
}

function renderAgenda() {
  const container = document.getElementById('agenda-slots-container');
  container.innerHTML = "";
  const hours = ["10:00", "11:00", "12:00", "13:00", "16:00", "17:00", "18:00", "19:00"];
  
  hours.forEach(h => {
    const cita = citas.find(c => c.time === h && c.date === "2024-05-20");
    if(cita) {
      container.innerHTML += `
        <div class="agenda-slot">
          <div class="slot-time">${h}</div>
          <div class="slot-content occupied" onclick="openStatusModal(${cita.id})">
            <div class="slot-client">${cita.name}</div>
            <div class="slot-service">${cita.service} • ${cita.status}</div>
          </div>
        </div>
      `;
    } else {
      container.innerHTML += `
        <div class="agenda-slot">
          <div class="slot-time">${h}</div>
          <div class="slot-content empty" onclick="openNewCitaWithTime('${h}')">
            <div class="slot-empty-text">+ Disponible</div>
          </div>
        </div>
      `;
    }
  });
}

function renderClientes() {
  const container = document.getElementById('clientes-list');
  container.innerHTML = "";
  // Sacar clientes únicos por nombre
  const uniqueNames = [...new Set(citas.map(c => c.name))];
  uniqueNames.forEach(name => {
    const lastCita = citas.filter(c => c.name === name).pop();
    const initials = name.split(' ').map(n => n[0]).join('');
    container.innerHTML += `
      <div class="cliente-card">
        <div class="cliente-avatar">${initials}</div>
        <div class="cliente-info">
          <div class="cliente-name">${name}</div>
          <div class="cliente-meta">Tel: ${lastCita.tel} | Última cita: ${lastCita.date}</div>
          <div class="cliente-services">
            <span class="service-tag">Frecuente</span>
            <span class="service-tag">${lastCita.service}</span>
          </div>
        </div>
        <div class="wa-btns">
          <a class="wa-btn" href="https://wa.me/${lastCita.tel}" target="_blank">Chat WA</a>
        </div>
      </div>
    `;
  });
}

/* ===== MODALS & ACTIONS ===== */
function openNewCita() { document.getElementById('modal-cita').classList.add('active'); }
function closeModal() { document.getElementById('modal-cita').classList.remove('active'); }

function saveNewCita() {
  const n = document.getElementById('m-name').value;
  const t = document.getElementById('m-tel').value;
  const s = document.getElementById('m-service').value;
  const d = document.getElementById('m-date').value;
  const h = document.getElementById('m-time').value;
  
  if(!n || !t) return alert("Completa nombre y teléfono");
  
  citas.push({id: Date.now(), name: n, tel: t, service: s, date: d, time: h, status: 'pendiente'});
  closeModal();
  renderAllCitas();
  renderDash();
}

function openStatusModal(id) {
  selectedCitaId = id;
  const cita = citas.find(c => c.id === id);
  document.getElementById('status-cita-info').innerText = `${cita.name} - ${cita.service} (${cita.time})`;
  document.getElementById('modal-status').classList.add('active');
}
function closeStatusModal() { document.getElementById('modal-status').classList.remove('active'); }

function updateCitaStatus(newStatus) {
  const cita = citas.find(c => c.id === selectedCitaId);
  if(cita) cita.status = newStatus;
  closeStatusModal();
  // Refrescar vistas
  renderDash();
  renderAllCitas();
  renderAgenda();
}

function deleteCita(id) {
  if(confirm("¿Seguro que quieres eliminar esta cita?")) {
    citas = citas.filter(c => c.id !== id);
    renderAllCitas();
    renderDash();
  }
}

function handleBooking(e) {
  e.preventDefault();
  const name = document.getElementById('b-name').value;
  const tel = document.getElementById('b-tel').value;
  const srv = document.getElementById('b-service').value;
  const date = document.getElementById('b-date').value;
  const time = document.getElementById('b-time').value;
  
  citas.push({id: Date.now(), name: name, tel: tel, service: srv, date: date, time: time, status: 'pendiente'});
  
  document.getElementById('appointment-form').style.display = 'none';
  document.getElementById('booking-success').style.display = 'block';
  
  setTimeout(() => {
    document.getElementById('appointment-form').reset();
    document.getElementById('appointment-form').style.display = 'block';
    document.getElementById('booking-success').style.display = 'none';
  }, 5000);
}

/* ===== CHATBOT LOGIC ===== */
function toggleChat() {
  document.getElementById('chat-window').classList.toggle('open');
}

function sendMessage() {
  const input = document.getElementById('chat-user-input');
  if(!input.value.trim()) return;
  
  const container = document.getElementById('chat-msgs');
  container.innerHTML += `<div class="msg msg-user">${input.value}</div>`;
  
  const val = input.value.toLowerCase();
  input.value = "";
  
  setTimeout(() => {
    if(val.includes('precio') || val.includes('cuanto')) botReply('precios');
    else if(val.includes('hora') || val.includes('abierto')) botReply('horarios');
    else if(val.includes('cita') || val.includes('reserva')) botReply('cita');
    else {
      container.innerHTML += `<div class="msg msg-bot">No estoy seguro de entenderte, pero puedes ver nuestros servicios o pedir cita directamente.</div>`;
    }
    container.scrollTop = container.scrollHeight;
  }, 600);
}

function botReply(type) {
  const container = document.getElementById('chat-msgs');
  let reply = "";
  if(type === 'precios') reply = "Nuestros cortes de caballero empiezan desde 18€ y señora desde 28€. ¿Quieres ver la lista completa?";
  if(type === 'horarios') reply = "Abrimos de Lunes a Viernes de 10:00 a 20:00 y Sábados hasta las 14:00.";
  if(type === 'cita') reply = "¡Genial! Puedes usar el formulario de la web o llamarnos al +34 600 000 000.";
  
  container.innerHTML += `<div class="msg msg-bot">${reply}</div>`;
  container.scrollTop = container.scrollHeight;
}

function sendWA(type) {
  const cita = citas.find(c => c.id === selectedCitaId);
  let text = "";
  if(type === 'recordatorio') text = `Hola ${cita.name}, te recordamos tu cita en BarberStudio hoy a las ${cita.time}. ¡Te esperamos!`;
  if(type === 'confirmacion') text = `Hola ${cita.name}, tu cita para el día ${cita.date} a las ${cita.time} ha sido confirmada.`;
  
  window.open(`https://wa.me/${cita.tel}?text=${encodeURIComponent(text)}`, '_blank');
}
</script>
</body>
</html>
