<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE STUDIO | Smart Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        :root { --primary: #c5a059; --dark: #0f172a; --bg: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: var(--dark); }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5); shadow: 0 10px 30px -10px rgba(0,0,0,0.1); }
        .btn-premium { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-premium:hover { transform: scale(1.02); box-shadow: 0 10px 20px -5px rgba(197, 160, 89, 0.4); }
        .appointment-row { animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="pb-20">

    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-md border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <div class="text-2xl font-extrabold tracking-tighter italic">THE<span class="text-[--primary] font-light">STUDIO</span></div>
            <div class="flex items-center gap-4">
                <span class="hidden md:block text-xs font-bold text-gray-400 uppercase tracking-widest">Sede Central - Murcia</span>
                <div class="w-10 h-10 bg-black rounded-full flex items-center justify-center text-white text-xs font-bold">JD</div>
            </div>
        </div>
    </nav>

    <header class="max-w-7xl mx-auto px-6 pt-12 pb-8">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-6">
            <div>
                <h1 class="text-4xl font-extrabold tracking-tight">¡Hola, Admin! 👋</h1>
                <p class="text-gray-500 mt-1">Hoy es <span id="current-date" class="font-semibold text-gray-800"></span></p>
            </div>
            <div class="flex gap-4 w-full md:w-auto">
                <div class="flex-1 md:flex-none glass-card bg-white p-5 rounded-3xl min-w-[160px] shadow-sm border-b-4 border-[--primary]">
                    <p class="text-[10px] font-bold text-gray-400 uppercase mb-1">Caja del Día</p>
                    <p class="text-3xl font-black" id="total-revenue">0€</p>
                </div>
                <button onclick="showNewAppointmentModal()" class="flex-1 md:flex-none btn-premium bg-black text-white px-8 py-5 rounded-3xl font-bold text-sm uppercase flex items-center justify-center gap-2">
                    <i class="fas fa-plus text-xs"></i> Nueva Cita
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 grid grid-cols-1 lg:grid-cols-3 gap-10">
        
        <div class="lg:col-span-2 space-y-6">
            <div class="bg-white rounded-[2rem] p-8 shadow-xl shadow-gray-200/50">
                <div class="flex justify-between items-center mb-8">
                    <h3 class="text-xl font-extrabold italic">Agenda Visual</h3>
                    <div class="flex gap-2">
                        <span class="w-3 h-3 rounded-full bg-green-500"></span>
                        <span class="w-3 h-3 rounded-full bg-amber-400"></span>
                        <span class="w-3 h-3 rounded-full bg-red-400"></span>
                    </div>
                </div>

                <div id="agenda-list" class="space-y-4">
                    </div>
            </div>
        </div>

        <div class="space-y-8">
            <div class="bg-[--primary] rounded-[2rem] p-8 text-white shadow-xl shadow-[--primary]/20">
                <h3 class="font-extrabold text-lg mb-4">Smart WhatsApp</h3>
                <p class="text-sm text-white/80 mb-6">Automatiza el contacto con tus clientes de hoy.</p>
                <div class="space-y-3">
                    <button class="w-full bg-black/20 hover:bg-black/40 p-4 rounded-2xl text-left text-xs font-bold flex items-center gap-3 transition">
                        <i class="fab fa-whatsapp text-xl"></i> Recordar Citas (Mañana)
                    </button>
                    <button class="w-full bg-white text-black p-4 rounded-2xl text-left text-xs font-bold flex items-center gap-3 transition">
                        <i class="fas fa-magic"></i> Mensaje de Fidelización
                    </button>
                </div>
            </div>

            <div class="bg-white rounded-[2rem] p-8 shadow-lg">
                <h3 class="text-xs font-black text-gray-300 uppercase mb-6 tracking-widest text-center">Ficha Cliente Actual</h3>
                <div id="quick-client" class="text-center">
                    <div class="w-24 h-24 bg-gray-50 rounded-full mx-auto mb-4 border-4 border-[--bg] shadow-inner flex items-center justify-center">
                        <i class="fas fa-user text-gray-200 text-3xl"></i>
                    </div>
                    <p class="text-gray-400 text-sm italic">Selecciona una cita para ver detalles</p>
                </div>
            </div>
        </div>
    </main>

    <div id="modal-appointment" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-10 appointment-row">
            <h2 class="text-2xl font-black mb-6">Nueva Reserva</h2>
            <div class="space-y-4">
                <input type="text" id="form-name" placeholder="Nombre del cliente" class="w-full p-4 bg-gray-50 rounded-2xl border-none focus:ring-2 focus:ring-[--primary] outline-none">
                <select id="form-service" class="w-full p-4 bg-gray-50 rounded-2xl border-none outline-none">
                    <option value="25">Corte Premium (25€)</option>
                    <option value="15">Perfilado Barba (15€)</option>
                    <option value="40">Color & Estilo (40€)</option>
                </select>
                <input type="time" id="form-time" class="w-full p-4 bg-gray-50 rounded-2xl border-none outline-none">
                <div class="flex gap-3 pt-4">
                    <button onclick="closeModal()" class="flex-1 p-4 font-bold text-gray-400">Cancelar</button>
                    <button onclick="addAppointment()" class="flex-1 bg-black text-white p-4 rounded-2xl font-bold btn-premium">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // LÓGICA DEL SISTEMA
        let appointments = JSON.parse(localStorage.getItem('appointments')) || [
            { id: 1, name: "Marcos García", service: "Corte Premium", price: 25, time: "10:30", status: "confirmado" },
            { id: 2, name: "Elena Ramos", service: "Color & Estilo", price: 40, time: "12:00", status: "pendiente" }
        ];

        function render() {
            const list = document.getElementById('agenda-list');
            const revenueDisplay = document.getElementById('total-revenue');
            const dateDisplay = document.getElementById('current-date');
            
            // Fecha actual
            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            dateDisplay.innerText = new Date().toLocaleDateString('es-ES', options);

            list.innerHTML = "";
            let total = 0;

            appointments.sort((a, b) => a.time.localeCompare(b.time)).forEach(app => {
                total += app.price;
                const statusColor = app.status === 'confirmado' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700';
                
                list.innerHTML += `
                    <div class="appointment-row bg-gray-50 hover:bg-white hover:shadow-xl hover:shadow-gray-100 transition-all p-5 rounded-[1.5rem] flex items-center gap-5 border border-transparent hover:border-gray-100 group">
                        <div class="text-center min-w-[70px]">
                            <span class="block text-lg font-black text-dark">${app.time}</span>
                            <span class="text-[9px] font-black text-[--primary] uppercase">Hoy</span>
                        </div>
                        <div class="flex-1">
                            <h4 class="font-extrabold text-gray-800 group-hover:text-[--primary] transition-colors">${app.name}</h4>
                            <p class="text-[11px] font-bold text-gray-400 uppercase tracking-widest">${app.service}</p>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="status-pill ${statusColor} px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-tighter">${app.status}</span>
                            <button class="w-10 h-10 bg-white border border-gray-100 rounded-full flex items-center justify-center text-green-500 hover:bg-green-500 hover:text-white transition shadow-sm">
                                <i class="fab fa-whatsapp"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
            revenueDisplay.innerText = total + "€";
            localStorage.setItem('appointments', JSON.stringify(appointments));
        }

        function showNewAppointmentModal() { document.getElementById('modal-appointment').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal-appointment').classList.add('hidden'); }

        function addAppointment() {
            const name = document.getElementById('form-name').value;
            const price = parseInt(document.getElementById('form-service').value);
            const time = document.getElementById('form-time').value;
            const serviceName = document.getElementById('form-service').options[document.getElementById('form-service').selectedIndex].text.split('(')[0];

            if(name && time) {
                appointments.push({ id: Date.now(), name, service: serviceName, price, time, status: 'pendiente' });
                render();
                closeModal();
                // Reset form
                document.getElementById('form-name').value = "";
                document.getElementById('form-time').value = "";
            }
        }

        // Init
        render();
    </script>
</body>
</html>
