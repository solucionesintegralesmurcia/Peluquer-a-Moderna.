<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HairOS - Sistema Premium para Peluquerías</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #d4af37;
            --dark: #121212;
            --dark-soft: #1e1e1e;
            --light: #fbfbfb;
            --success: #27ae60;
            --danger: #e74c3c;
            --warning: #f1c40f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--light); overflow-x: hidden; }

        /* --- NAVEGACIÓN DE VISTAS --- */
        .view { display: none; min-height: 100vh; }
        .view.active { display: block; }
        #admin-panel.active { display: grid; grid-template-columns: 260px 1fr; }

        /* --- ESTILOS COMUNES --- */
        .glass-card { background: white; border-radius: 12px; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 4px 15px rgba(0,0,0,0.05); padding: 20px; transition: 0.3s; }
        .btn { padding: 10px 20px; border-radius: 8px; cursor: pointer; border: none; font-weight: 600; transition: 0.2s; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-dark { background: var(--dark); color: white; }
        .btn-whatsapp { background: #25d366; color: white; }

        /* --- WEB PÚBLICA --- */
        .hero { height: 80vh; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1503951914875-452162b0f3f1?q=80&w=1920'); background-size: cover; display: flex; align-items: center; justify-content: center; text-align: center; color: white; }
        .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 50px 10%; }

        /* --- PANEL INTERNO --- */
        .sidebar { background: var(--dark); color: white; padding: 30px 20px; }
        .sidebar h2 { color: var(--primary); margin-bottom: 40px; font-size: 1.2rem; }
        .sidebar-nav { list-style: none; }
        .sidebar-nav li { padding: 12px; cursor: pointer; border-radius: 8px; margin-bottom: 5px; opacity: 0.7; transition: 0.3s; }
        .sidebar-nav li:hover, .sidebar-nav li.active { background: var(--dark-soft); opacity: 1; color: var(--primary); }

        .main-content { padding: 40px; background: #f4f6f8; }
        .agenda-list { margin-top: 25px; }
        .appointment-card { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-left: 6px solid var(--primary); }
        
        /* Estados de cita dinámicos */
        .status-pill { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }
        .status-pendiente { background: #eee; color: #666; }
        .status-confirmado { background: #d4edda; color: #155724; }
        .status-vino { background: #cce5ff; color: #004085; }
        .status-cancelado { background: #f8d7da; color: #721c24; }

        /* --- CHATBOT --- */
        #chatbot-ui { position: fixed; bottom: 80px; right: 20px; width: 320px; height: 400px; display: none; flex-direction: column; z-index: 1000; }
        .chat-body { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 10px; font-size: 0.85rem; max-width: 80%; }
        .msg-bot { background: #f0f0f0; align-self: flex-start; }
        .msg-user { background: var(--primary); color: white; align-self: flex-end; }

        /* BOTÓN FLOTANTE */
        .fab { position: fixed; bottom: 20px; right: 20px; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 1001; }
    </style>
</head>
<body>

    <!-- BOTONES DE NAVEGACIÓN (DEMO) -->
    <div style="position: fixed; top: 10px; right: 10px; z-index: 9999;">
        <button class="btn btn-dark" onclick="showView('public-web')">Web</button>
        <button class="btn btn-primary" onclick="showView('admin-panel')">Panel Gestión</button>
    </div>

    <!-- 1. VISTA WEB PÚBLICA -->
    <div id="public-web" class="view active">
        <section class="hero">
            <div>
                <h1 style="font-size: 3rem;">HAIR & STYLE</h1>
                <p style="margin-bottom: 20px;">Barbería Premium en Murcia</p>
                <button class="btn btn-primary" onclick="showView('admin-panel')">RESERVAR CITA</button>
            </div>
        </section>
        <div class="services-grid">
            <div class="glass-card"><i class="fas fa-cut"></i> <h3>Corte Caballero</h3><p>20€</p></div>
            <div class="glass-card"><i class="fas fa-razor"></i> <h3>Arreglo Barba</h3><p>12€</p></div>
            <div class="glass-card"><i class="fas fa-magic"></i> <h3>Tratamiento</h3><p>30€</p></div>
        </div>
    </div>

    <!-- 2. VISTA PANEL INTERNO -->
    <div id="admin-panel" class="view">
        <aside class="sidebar">
            <h2>HAIR OS</h2>
            <ul class="sidebar-nav">
                <li class="active"><i class="fas fa-calendar-day"></i> Agenda</li>
                <li><i class="fas fa-users"></i> Clientes</li>
                <li><i class="fas fa-chart-pie"></i> Finanzas</li>
            </ul>
        </aside>
        <main class="main-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <h1>Agenda Hoy</h1>
                <button class="btn btn-primary" onclick="addMockAppointment()">+ Nueva Cita</button>
            </div>

            <div id="agenda-list" class="agenda-list">
                <!-- Las citas se cargan aquí dinámicamente -->
            </div>
        </main>
    </div>

    <!-- 3. CHATBOT ESTRUCTURA -->
    <div id="chatbot-ui" class="glass-card">
        <div style="background: var(--dark); color: white; padding: 15px; border-radius: 10px 10px 0 0;">Asistente HairOS</div>
        <div class="chat-body" id="chat-content">
            <div class="msg msg-bot">Hola, ¿en qué puedo ayudarte?</div>
        </div>
        <div style="padding: 10px; border-top: 1px solid #eee;">
            <button class="btn" style="font-size: 0.7rem; width: 100%; margin-bottom: 5px;" onclick="askBot('Horarios')">Ver Horarios</button>
            <button class="btn" style="font-size: 0.7rem; width: 100%;" onclick="askBot('Precios')">Ver Precios</button>
        </div>
    </div>
    <div class="fab btn-dark" onclick="toggleChat()"><i class="fas fa-comment"></i></div>

    <!-- LÓGICA FUNCIONAL -->
    <script>
        // Datos de ejemplo para que veas funcionalidad real
        let citas = [
            { id: 1, hora: '10:00', cliente: 'Marcos Ruiz', servicio: 'Corte + Barba', estado: 'pendiente', tel: '34600000000' },
            { id: 2, hora: '11:30', cliente: 'Laura Soler', servicio: 'Tinte Premium', estado: 'confirmado', tel: '34600000000' }
        ];

        // Función para cambiar de vista (Web vs Panel)
        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            if(viewId === 'admin-panel') renderAgenda();
        }

        // Renderizar la agenda visual
        function renderAgenda() {
            const list = document.getElementById('agenda-list');
            list.innerHTML = '';
            citas.sort((a,b) => a.hora.localeCompare(b.hora)).forEach(cita => {
                list.innerHTML += `
                    <div class="appointment-card glass-card">
                        <div style="display:flex; align-items:center; gap:20px;">
                            <b style="font-size:1.1rem; width:60px;">${cita.hora}</b>
                            <div>
                                <strong>${cita.cliente}</strong><br>
                                <small style="color:#666">${cita.servicio}</small>
                            </div>
                        </div>
                        <div style="display:flex; align-items:center; gap:10px;">
                            <select onchange="updateEstado(${cita.id}, this.value)" class="status-pill status-${cita.estado}">
                                <option value="pendiente" ${cita.estado==='pendiente'?'selected':''}>Pendiente</option>
                                <option value="confirmado" ${cita.estado==='confirmado'?'selected':''}>Confirmado</option>
                                <option value="vino" ${cita.estado==='vino'?'selected':''}>Vino</option>
                                <option value="cancelado" ${cita.estado==='cancelado'?'selected':''}>Cancelado</option>
                            </select>
                            <button class="btn btn-whatsapp" onclick="enviarWA('${cita.tel}', '${cita.cliente}', '${cita.hora}')">
                                <i class="fab fa-whatsapp"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        // Actualizar estado dinámicamente
        function updateEstado(id, nuevoEstado) {
            const cita = citas.find(c => c.id === id);
            cita.estado = nuevoEstado;
            renderAgenda();
        }

        // WhatsApp Funcional
        function enviarWA(tel, nombre, hora) {
            const texto = `Hola ${nombre}, te confirmamos tu cita hoy a las ${hora}. ¡Te esperamos en Hair & Style!`;
            window.open(`https://wa.me/${tel}?text=${encodeURIComponent(texto)}`, '_blank');
        }

        // Añadir cita de prueba
        function addMockAppointment() {
            const nueva = { id: Date.now(), hora: '12:00', cliente: 'Cliente Nuevo', servicio: 'Corte', estado: 'pendiente', tel: '34600000000' };
            citas.push(nueva);
            renderAgenda();
        }

        // Chatbot Lógica
        function toggleChat() {
            const ui = document.getElementById('chatbot-ui');
            ui.style.display = ui.style.display === 'flex' ? 'none' : 'flex';
        }

        function askBot(tema) {
            const content = document.getElementById('chat-content');
            content.innerHTML += `<div class="msg msg-user">${tema}</div>`;
            
            setTimeout(() => {
                let respuesta = "";
                if(tema === 'Horarios') respuesta = "Abrimos de L-S de 10:00 a 20:00.";
                if(tema === 'Precios') respuesta = "Cortes desde 18€. Arreglo de barba 12€.";
                content.innerHTML += `<div class="msg msg-bot">${respuesta}</div>`;
                content.scrollTop = content.scrollHeight;
            }, 500);
        }
    </script>
</body>
</html>
